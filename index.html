<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect + non-blocking load (display=swap) so they don't block render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <meta name="theme-color" content="#f6f6f7" />
    <meta
      name="description"
      content="Front Desk AI — the future of sales management at your fingertips. A 24/7 AI sales force that answers every call, captures every lead, and books the deal."
    />
    <meta property="og:title" content="Front Desk AI — The future of sales management at your fingertips" />
    <meta
      property="og:description"
      content="An always-on AI that answers every call in milliseconds, qualifies and captures every lead, and books the deal."
    />
    <meta property="og:type" content="website" />
    <title>Front Desk AI — The future of sales management at your fingertips</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
